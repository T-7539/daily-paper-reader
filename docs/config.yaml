  - tag: sketch-to-D
    description: 检索以绘画类二维内容为输入，生成或重建三维内容的学术论文，重点关注：从草图、线稿、插画、角色原画、概念设定图、漫画或动漫场景帧生成三维内容；输出包括 Mesh、点云、NeRF、3D Gaussian、三维角色、三维物体、三维场景、多视角图像、三维动画或可进行新视角渲染的表示；重点收录专门针对非真实感绘画输入设计的方法；同时收录能够应用于绘画输入的通用单图生成三维方法；关注几何质量、纹理质量、多视角一致性、语义或部件分解、可编辑性、风格保持和生成效率；优先检索 CVPR、ICCV、ECCV、SIGGRAPH、SIGGRAPH Asia、NeurIPS、ICLR、AAAI、ACM MM 等重要会议及 arXiv 最新论文；时间范围以 2017 年至今为主。
